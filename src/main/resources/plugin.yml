name: Oryn-Tunnelv2
description: '${description}'
version: '${version}'

main: net.oryn.mc.orynTunnelv2.OrynTunnelv2
api-version: '1.21.1'
load: STARTUP

authors: [Fahry-a]

commands:
  otunnel:
    description: Oryn Tunnel management command
    usage: /otunnel <status|start|stop|update|reload|help>
    permission: otunnel.admin

permissions:
  otunnel.admin:
    description: Allows use of all Oryn Tunnel commands
    default: op
  otunnel.status:
    description: Allows checking tunnel status
    default: op
  otunnel.start:
    description: Allows starting the tunnel
    default: op
  otunnel.stop:
    description: Allows stopping the tunnel
    default: op
  otunnel.update:
    description: Allows updating cloudflared binary
    default: op
  otunnel.reload:
    description: Allows reloading configuration
    default: op
  otunnel.gui:
    description: Allows opening the tunnel GUI
    default: op
